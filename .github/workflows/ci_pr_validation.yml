name: CI - PR Validation

permissions:
    contents: read

on:
    pull_request:
        branches: ["**"] # Run PR validation on any branch.

    workflow_dispatch: # Manual trigger option.

jobs:
    # Build the dev-environment image once and populate the shared build cache,
    # so the per-architecture jobs below restore it instead of each doing a full
    # (toolchain-downloading) cold build.
    build_dev_env:
        name: Build dev environment image
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout Github repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                submodules: false # The Dockerfile lives in .devcontainer/ (this repo); no submodules needed here.

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

            - name: Warm the dev environment image build cache
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                context: .devcontainer # Dockerfile defaults to <context>/Dockerfile.
                platforms: linux/amd64
                push: false # The image is consumed as a Dockerfile, not published.
                load: false # Cache only; nothing to run in this job.
                cache-from: type=gha,scope=devenv
                cache-to: type=gha,mode=max,scope=devenv
                provenance: false # Disabled implicit provenance.

    verify_pr:
        name: ${{ matrix.arch }}
        needs: build_dev_env
        runs-on: ubuntu-latest
        timeout-minutes: 45

        strategy:
            fail-fast: false # Don't cancel other jobs if one fails.

            max-parallel: 20 # Use maximum possible parallelisation.

            matrix:
                arch: [m0, m0plus, m1, m3]

        steps:
            - name: Checkout Github repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                submodules: recursive # Libraries + toolchains under test.

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

            - name: Build the dev environment image (restored from cache)
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                context: .devcontainer
                platforms: linux/amd64
                push: false
                load: true # Load into the local Docker daemon so the next step can run it.
                tags: devenv:ci
                cache-from: type=gha,scope=devenv
                provenance: false

            - name: Run CMake workflow
              run: |
                docker run --rm \
                  --volume "${{ github.workspace }}:/work" \
                  --workdir /work \
                  devenv:ci \
                  cmake --workflow --preset=${{ matrix.arch }}

    pr_verification_summary:
        name: PR verification summary
        needs: verify_pr

        runs-on: ubuntu-latest

        timeout-minutes: 5

        if: always() # Run even if some matrix jobs failed.

        steps:
            - name: Check if all jobs succeeded
              run: |
                if [[ "${{ needs.verify_pr.result }}" != "success" ]]; then
                  echo "One or more jobs failed"
                  exit 1
                fi
                echo "All jobs completed successfully"
